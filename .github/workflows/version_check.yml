name: version check

permissions:
  contents: read

on:
  push:
    tags:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Version check
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
            grep -E 'const version =' build.zig | grep -E "\"${TAG_NAME}\"" || exit 78
            echo "Zig build version check passed."
            grep -E "project\(aegis.*VERSION ${TAG_NAME}.*\)" CMakeLists.txt || exit 78
            echo "CMake version check passed."
